name: Growise Backend CI

on:
  push:
    branches: 
      - dev
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: 
        - dev
        - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for Gitleaks to scan history
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test_backend:
    needs: gitleaks
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
          
      - name: Create Firebase Key File
        run: |
          cat << 'EOF' > firebase-key.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Lint with Ruff
        run: ruff check .
             

      - name: Run Pytest
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CREDENTIALS_PATH: ./firebase-key.json
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest tests/

  schemathesis:
    needs: test_backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install schemathesis

      - name: Create Firebase Key File
        run: |
          cat << 'EOF' > firebase-key.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run Schemathesis Tests
        env:
          # We need to pass dummy keys so the app can start up
          FIREBASE_CREDENTIALS_PATH: ./firebase-key.json
          GROQ_API_KEY: "dummy"
          USDA_API_KEY: "dummy"
          FIREBASE_PROJECT_ID: "growise-test"
        run: |
          # 1. Start the FastAPI server in the background
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 & 
          
          # 2. Wait for the server to be ready
          sleep 5 
          
          # 3. Run Schemathesis against the local server
          schemathesis run http://localhost:8000/openapi.json --checks all || true