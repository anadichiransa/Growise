name: Growise Backend CI

on:
  push:
    branches: [ dev ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ dev ]
    paths:
      - 'backend/**'

jobs:
  test_backend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      
      - name: Run Pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest -m pytest tests/unit/test_dummy.py
